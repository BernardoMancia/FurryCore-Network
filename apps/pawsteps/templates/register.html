{% extends "base_social.html" %}
{% block title %}Cadastro — PawSteps{% endblock %}

{% block content %}
<div class="auth-wrapper" style="margin-left: calc(-1 * var(--sidebar-w)); margin-right: calc(-1 * var(--sidebar-right-w)); min-height: 100vh;">
    <div class="auth-card" style="max-width:480px;">
        <div class="text-center mb-4">
            <div class="auth-logo">PawSteps</div>
            <p class="text-low small">Junte-se à comunidade furry</p>
        </div>
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control" placeholder="lobo_azul" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Nome de Exibição</label>
                    <input type="text" name="display_name" class="form-control" placeholder="Lobo Azul" required>
                </div>
                <div class="col-12">
                    <label class="form-label">E-mail</label>
                    <input type="email" name="email" class="form-control" placeholder="lobo@email.com" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Senha</label>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required id="regPass">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Confirmar Senha</label>
                    <input type="password" name="confirm_password" class="form-control" placeholder="••••••••" required>
                </div>
                <div class="col-12">
                    <div class="d-flex align-items-center gap-3 p-3" style="background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-md);">
                        <input type="checkbox" name="is_plus18" id="plus18" class="form-check-input" style="width:20px;height:20px;cursor:pointer;">
                        <label for="plus18" class="small text-mid" style="cursor:pointer;">Tenho 18 anos ou mais (necessário para conteúdo NSFW)</label>
                    </div>
                </div>
                <div class="col-12 mt-2">
                    <div id="passStrength" class="mb-2" style="height:3px;border-radius:2px;background:var(--border);overflow:hidden;">
                        <div id="passBar" style="height:100%;width:0%;transition:0.3s;border-radius:2px;"></div>
                    </div>
                    <button type="submit" class="neon-btn w-100 py-3">Criar Conta</button>
                </div>
            </div>
        </form>
        <div class="text-center mt-3">
            <p class="text-low small">Já tem conta? <a href="{{ url_for('login_social') }}" class="text-accent fw-bold">Entrar</a></p>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('regPass').addEventListener('input', function() {
    const bar = document.getElementById('passBar');
    const v = this.value;
    let s = 0;
    if(v.length >= 6) s++;
    if(v.length >= 10) s++;
    if(/[A-Z]/.test(v)) s++;
    if(/[0-9]/.test(v)) s++;
    if(/[^A-Za-z0-9]/.test(v)) s++;
    const w = (s/5)*100;
    const colors = ['#ef4444','#f59e0b','#f59e0b','#22c55e','#00e5ff'];
    bar.style.width = w+'%';
    bar.style.background = colors[s-1] || '#ef4444';
});
</script>
{% endblock %}
