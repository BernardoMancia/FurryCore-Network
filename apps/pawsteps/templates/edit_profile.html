{% extends "base_social.html" %}
{% block title %}Editar Perfil — PawSteps{% endblock %}

{% block content %}
<div style="padding:20px 20px 12px;border-bottom:1px solid var(--border);">
    <div class="d-flex justify-content-between align-items-center">
        <h5 class="fw-bold mb-0">Editar Perfil</h5>
        <a href="{{ url_for('profile', username=current_user.username) }}" class="text-low small"><i class="bi bi-x-lg"></i></a>
    </div>
</div>

<form method="POST" enctype="multipart/form-data" style="padding:20px;">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div class="mb-4">
        <label class="form-label">Foto de capa</label>
        <div style="height:140px;border-radius:var(--radius-lg);overflow:hidden;background:var(--bg-elevated);border:1px solid var(--border);background-image:url('{{ user.profile_cover_url or '' }}');background-size:cover;background-position:center;position:relative;cursor:pointer;" onclick="document.getElementById('coverFile').click()">
            <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.4);opacity:0;transition:0.2s;" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0">
                <i class="bi bi-camera text-white fs-3"></i>
            </div>
        </div>
        <input type="file" name="cover_file" id="coverFile" class="d-none" accept="image/*">
        <input type="hidden" name="profile_cover_url" value="{{ user.profile_cover_url or '' }}">
    </div>

    <div class="mb-4 d-flex gap-4 align-items-end">
        <div style="position:relative;cursor:pointer;" onclick="document.getElementById('avatarFile').click()">
            <img src="{{ user.avatar_url or 'https://api.dicebear.com/7.x/big-ears/svg?seed=' ~ user.username }}" class="avatar-xl" style="border:3px solid var(--border);" id="avatarPreview">
            <div style="position:absolute;inset:0;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.4);opacity:0;transition:0.2s;" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0">
                <i class="bi bi-camera text-white fs-4"></i>
            </div>
        </div>
        <input type="file" name="avatar_file" id="avatarFile" class="d-none" accept="image/*">
        <input type="hidden" name="avatar_url" value="{{ user.avatar_url or '' }}">
        <div class="flex-grow-1">
            <label class="form-label">Nome de Exibição</label>
            <input type="text" name="display_name" class="form-control" value="{{ user.display_name }}" required>
        </div>
    </div>

    <div class="mb-3">
        <label class="form-label">Bio</label>
        <textarea name="bio" class="form-control" rows="3" placeholder="Conte sobre você...">{{ user.bio or '' }}</textarea>
    </div>

    <div class="row g-3 mb-4">
        <div class="col-md-6">
            <label class="form-label">E-mail</label>
            <input type="email" name="email" class="form-control" value="{{ user.email }}">
        </div>
        <div class="col-md-6">
            <label class="form-label">Telefone</label>
            <input type="tel" name="phone_number" class="form-control" value="{{ user.phone_number or '' }}" placeholder="+55 11 99999-9999">
        </div>
    </div>

    <div class="mb-4 p-3" style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-md);">
        <h6 class="fw-bold mb-3 text-mid" style="font-size:0.8rem;text-transform:uppercase;letter-spacing:1px;">Preferências</h6>
        <div class="d-flex flex-column gap-3">
            <label class="d-flex align-items-center justify-content-between" style="cursor:pointer;">
                <div>
                    <div class="fw-bold small">Autenticação MFA</div>
                    <div class="text-low x-small">Camada extra de segurança</div>
                </div>
                <div class="form-check form-switch mb-0">
                    <input class="form-check-input" type="checkbox" name="mfa_enabled" {{ 'checked' if user.mfa_enabled }} style="cursor:pointer;">
                </div>
            </label>
            <label class="d-flex align-items-center justify-content-between" style="cursor:pointer;">
                <div>
                    <div class="fw-bold small">Ver conteúdo NSFW</div>
                    <div class="text-low x-small">Mostrar posts marcados como +18</div>
                </div>
                <div class="form-check form-switch mb-0">
                    <input class="form-check-input" type="checkbox" name="view_nsfw" {{ 'checked' if user.view_nsfw }} style="cursor:pointer;">
                </div>
            </label>
            <label class="d-flex align-items-center justify-content-between" style="cursor:pointer;">
                <div>
                    <div class="fw-bold small">Compartilhar localização</div>
                    <div class="text-low x-small">Aparecer no mapa de proximidade</div>
                </div>
                <div class="form-check form-switch mb-0">
                    <input class="form-check-input" type="checkbox" name="share_location" {{ 'checked' if user.share_location }} style="cursor:pointer;">
                </div>
            </label>
        </div>
    </div>

    <button type="submit" class="neon-btn w-100 py-3">Salvar Alterações</button>
</form>
{% endblock %}
