{% extends "base_social.html" %}
{% block title %}Mapa — PawSteps{% endblock %}

{% block head %}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
    #map {
        height: calc(100vh - 56px);
        width: 100%;
        border-radius: 0;
    }
    @media (min-width: 768px) {
        #map { height: 100vh; }
    }
    .leaflet-popup-content-wrapper {
        background: var(--bg-elevated) !important;
        border: 1px solid var(--border) !important;
        border-radius: var(--radius-md) !important;
        color: var(--text-high) !important;
    }
    .leaflet-popup-tip { background: var(--bg-elevated) !important; }
    .map-controls {
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 1000;
        display: flex;
        gap: 8px;
    }
</style>
{% endblock %}

{% block content %}
<div style="position:relative;">
    <div id="map"></div>
    {% if current_user.is_authenticated %}
    <div class="map-controls">
        <button class="neon-btn px-4 py-2" onclick="shareLocation()" style="font-size:0.85rem;"><i class="bi bi-broadcast me-1"></i>Compartilhar Localização</button>
        <button class="btn-ghost px-3 py-2" onclick="stopSharing()" style="font-size:0.85rem;"><i class="bi bi-x-lg"></i></button>
    </div>
    {% endif %}
</div>
{% endblock %}

{% block scripts %}
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const map = L.map('map').setView([-23.55, -46.63], 4);
L.tileLayer('https://tiles.stadiamaps.com/tiles/alidade_smooth_dark/{z}/{x}/{y}{r}.png', {
    maxZoom: 18,
    attribution: '&copy; <a href="https://stadiamaps.com/">Stadia</a>'
}).addTo(map);

fetch('/api/nearby-users')
    .then(r => r.json())
    .then(users => {
        users.forEach(u => {
            const icon = L.divIcon({
                className: '',
                html: `<div style="width:32px;height:32px;border-radius:50%;background:var(--gradient);display:flex;align-items:center;justify-content:center;box-shadow:0 0 10px rgba(0,229,255,0.4);"><i class="bi bi-person-fill text-white" style="font-size:0.9rem;"></i></div>`,
                iconSize: [32, 32],
                iconAnchor: [16, 16]
            });
            L.marker([u.lat, u.lng], { icon })
                .addTo(map)
                .bindPopup(`<strong>${u.display_name}</strong><br><span style="color:var(--accent);">@${u.username}</span>`);
        });
    });

{% if current_user.is_authenticated %}
const csrfToken = "{{ csrf_token() }}";
function shareLocation() {
    if (!navigator.geolocation) return;
    navigator.geolocation.getCurrentPosition(pos => {
        fetch('/api/update-location', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrfToken },
            body: JSON.stringify({ lat: pos.coords.latitude, lng: pos.coords.longitude, active: true })
        }).then(() => location.reload());
    });
}
function stopSharing() {
    fetch('/api/update-location', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrfToken },
        body: JSON.stringify({ lat: 0, lng: 0, active: false })
    }).then(() => location.reload());
}
{% endif %}
</script>
{% endblock %}
