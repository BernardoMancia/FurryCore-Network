{% extends "base_social.html" %}
{% block title %}Login — PawSteps{% endblock %}

{% block content %}
<div class="auth-wrapper" style="margin-left: calc(-1 * var(--sidebar-w)); margin-right: calc(-1 * var(--sidebar-right-w)); min-height: 100vh;">
    <div class="auth-card">
        <div class="text-center mb-4">
            <div class="auth-logo">PawSteps</div>
            <p class="text-low small">Entre na comunidade furry</p>
        </div>
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-3">
                <label class="form-label">Usuário ou E-mail</label>
                <div class="position-relative">
                    <input type="text" name="username" class="form-control" style="padding-left:40px;" placeholder="@username" required>
                    <i class="bi bi-person position-absolute text-low" style="top:50%;left:14px;transform:translateY(-50%);"></i>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label">Senha</label>
                <div class="position-relative">
                    <input type="password" name="password" class="form-control" style="padding-left:40px;" placeholder="••••••••" required>
                    <i class="bi bi-lock position-absolute text-low" style="top:50%;left:14px;transform:translateY(-50%);"></i>
                </div>
            </div>
            <button type="submit" class="neon-btn w-100 py-3 mb-3">Entrar</button>
        </form>
        <div class="text-center">
            <p class="text-low small">Não tem conta? <a href="{{ url_for('register') }}" class="text-accent fw-bold">Cadastre-se</a></p>
        </div>
    </div>
</div>
{% endblock %}
