{% extends "base.html" %}

{% block title %}Autenticação MFA - CGRF 2.0{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="glass-card">
            <h2 class="neon-text text-center mb-4">Verificação de Segurança</h2>
            <p class="text-secondary text-center small mb-4">Insira o código gerado no seu aplicativo autenticador.</p>
            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="mb-4">
                    <label class="form-label">Token MFA</label>
                    <input type="text" name="token" class="form-control bg-dark text-white border-secondary text-center fs-4" placeholder="000 000" autofocus required maxlength="6">
                </div>
                <button type="submit" class="btn btn-neon w-100">Verificar e Entrar</button>
            </form>
            <div class="mt-3 text-center">
                <a href="{{ url_for('login') }}" class="text-secondary small">Voltar ao Login</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
