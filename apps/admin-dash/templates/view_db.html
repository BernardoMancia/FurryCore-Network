{% extends "base.html" %}
{% set active_page = 'database' %}

{% block title %}Banco de Dados: {{ app_name }}{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-5">
    <div>
        <h2 class="fw-bold text-uppercase neon-glow"><i class="bi bi-database me-2"></i> {{ app_name }} Explorer</h2>
        <p class="text-white-50">Exploração de tabelas e registros brutos.</p>
    </div>
    <a href="/" class="btn btn-outline-secondary btn-sm">Voltar</a>
</div>

<div class="row g-4">
    {% for table in tables %}
    <div class="col-md-3">
        <a href="/database/{{ app_name }}/{{ table }}" class="text-decoration-none">
            <div class="cyber-card text-center py-4 bg-dark-subtle border-secondary hover-lift" style="transition: 0.3s;">
                <i class="bi bi-table fs-2 text-info d-block mb-2"></i>
                <h6 class="fw-bold mb-0 text-white">{{ table }}</h6>
            </div>
        </a>
    </div>
    {% endfor %}
</div>

<style>
    .hover-lift:hover {
        transform: translateY(-5px);
        border-color: var(--accent) !important;
        box-shadow: 0 5px 15px rgba(0, 242, 255, 0.1);
    }
</style>
{% endblock %}
