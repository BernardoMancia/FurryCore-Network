<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | FurryCore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #06070a;
            --cyber-blue: #00f2ff;
            --cyber-purple: #bc13fe;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }
        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: radial-gradient(circle at center, #0f172a 0%, #06070a 100%);
        }
        .login-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.05);
        }
        .neon-title {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            background: linear-gradient(45deg, var(--cyber-blue), var(--cyber-purple));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            margin-bottom: 30px;
        }
        .form-control {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            color: white;
            border-radius: 12px;
            padding: 12px;
        }
        .form-control:focus {
            background: rgba(255,255,255,0.08);
            border-color: var(--cyber-blue);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
            color: white;
        }
        .btn-cyber {
            background: linear-gradient(45deg, var(--cyber-blue), var(--cyber-purple));
            border: none;
            color: white;
            font-weight: 700;
            padding: 12px;
            border-radius: 12px;
            width: 100%;
            transition: 0.3s;
        }
        .btn-cyber:hover {
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.4);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h2 class="neon-title">Admin Dashboard</h2>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} small py-2">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        <form method="POST">
            <div class="mb-3">
                <label class="form-label small text-white-50">Usuário</label>
                <input type="text" name="username" class="form-control" required placeholder="Luke_Arwolf">
            </div>
            <div class="mb-4">
                <label class="form-label small text-white-50">Senha</label>
                <input type="password" name="password" class="form-control" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-cyber">ACESSAR SISTEMA</button>
        </form>
    </div>
</body>
</html>
