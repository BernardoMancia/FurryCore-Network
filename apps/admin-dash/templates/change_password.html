<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trocar Senha | Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: #06070a; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .card-cyber { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 30px; width: 400px; }
        .form-control { background: #111; border: 1px solid #333; color: white; }
    </style>
</head>
<body>
    <div class="card-cyber">
        <h3 class="fw-bold text-center mb-4">Troca de Senha Obrigatória</h3>
        <p class="small text-white-50 text-center">Identificamos que este é seu primeiro acesso. Por favor, defina uma nova senha segura.</p>
        <form method="POST">
            <div class="mb-4">
                <label class="form-label">Nova Senha</label>
                <input type="password" name="new_password" class="form-control" required minlength="8">
            </div>
            <button type="submit" class="btn btn-info w-100 fw-bold">SALVAR NOVA SENHA</button>
        </form>
    </div>
</body>
</html>
