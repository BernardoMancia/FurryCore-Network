{% extends "base.html" %}
{% set active_page = 'dashboard' %}

{% block title %}Alterar Senha{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="cyber-card p-4">
            <h3 class="fw-bold neon-glow text-center mb-4"><i class="bi bi-key me-2"></i> Alterar Senha</h3>
            <p class="text-white-50 text-center small mb-4">Por segurança, você deve definir uma nova senha para o seu primeiro acesso ao Dashboard.</p>
            
            <form method="POST">
                <div class="mb-4">
                    <label class="form-label small text-info uppercase fw-bold">Nova Senha de Acesso</label>
                    <input type="password" name="new_password" class="form-control py-3" required placeholder="Digite sua nova senha forte">
                </div>
                <button type="submit" class="btn btn-neon w-100 py-3">ATUALIZAR CREDENCIAIS</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
