{% extends "base.html" %}
{% set active_page = 'dashboard' %}

{% block title %}Alterar Senha{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="cyber-card p-4">
            <div class="text-center mb-4">
                <div class="d-inline-flex align-items-center justify-content-center rounded-4 mb-3"
                     style="width: 60px; height: 60px; background: linear-gradient(135deg, rgba(0,242,255,0.1), rgba(188,19,254,0.1)); border: 1px solid rgba(0,242,255,0.2);">
                    <i class="bi bi-key-fill fs-3 neon-glow"></i>
                </div>
                <h3 class="fw-bold neon-glow">Alterar Senha</h3>
                <p class="text-white-50 small">Por segurança, defina uma nova senha para o seu acesso ao Dashboard.</p>
            </div>

            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="mb-4">
                    <label class="form-label small text-info text-uppercase fw-bold">Nova Senha de Acesso</label>
                    <input type="password" name="new_password" class="form-control py-3" required
                           placeholder="Digite sua nova senha forte" autocomplete="new-password">
                </div>
                <button type="submit" class="btn-neon w-100 py-3 fw-bold text-uppercase" style="letter-spacing: 1px;">
                    <i class="bi bi-shield-check me-2"></i>Atualizar Credenciais
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
