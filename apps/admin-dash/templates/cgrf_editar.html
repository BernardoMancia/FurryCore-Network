{% extends "base.html" %}
{% set active_page = 'cgrf_records' %}

{% block title %}Editar Registro: {{ reg.cnf }}{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-5">
    <div>
        <h2 class="fw-bold neon-glow"><i class="bi bi-pencil-square me-2"></i> Editar Identidade</h2>
        <p class="text-white-50">Alteração de dados cadastrais para o CNF {{ reg.cnf }}</p>
    </div>
    <a href="/cgrf/records" class="btn btn-outline-secondary btn-sm">Cancelar</a>
</div>

<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="cyber-card p-4">
            <form method="POST">
                <div class="row g-4">
                    <div class="col-md-6">
                        <label class="form-label small text-info uppercase fw-bold">Nome Completo</label>
                        <input type="text" name="nome" class="form-control" value="{{ reg.nome }}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small text-info uppercase fw-bold">Espécie</label>
                        <input type="text" name="especie" class="form-control" value="{{ reg.especie }}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small text-info uppercase fw-bold">Cidade</label>
                        <input type="text" name="cidade" class="form-control" value="{{ reg.cidade or '' }}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small text-info uppercase fw-bold">País</label>
                        <input type="text" name="pais" class="form-control" value="{{ reg.pais or 'Brasil' }}">
                    </div>
                    <div class="col-12 mt-5">
                        <button type="submit" class="btn btn-neon w-100 py-3">SALVAR ALTERAÇÕES</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
