<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}FurryCore Shop - Oficial{% endblock %}</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <!-- Bootstrap & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/shop_style.css') }}">
</head>
<body>
    
    <header class="shop-header">
        <div class="container d-flex justify-content-between align-items-center">
            <a href="{{ url_for('index') }}" class="text-decoration-none">
                <h2 class="fw-bold mb-0" style="color: var(--accent-neon);">FurryCore <span style="color: #fff;">Shop</span></h2>
            </a>
            
            <div class="d-flex align-items-center gap-4">
                <div class="d-flex gap-2 small">
                    <a href="{{ url_for('set_language', lang='pt') }}" class="text-decoration-none {{ 'text-info fw-bold' if current_lang == 'pt' else 'text-white-50' }}">PT</a>
                    <span class="text-white-50">|</span>
                    <a href="{{ url_for('set_language', lang='en') }}" class="text-decoration-none {{ 'text-info fw-bold' if current_lang == 'en' else 'text-white-50' }}">EN</a>
                    <span class="text-white-50">|</span>
                    <a href="{{ url_for('set_language', lang='es') }}" class="text-decoration-none {{ 'text-info fw-bold' if current_lang == 'es' else 'text-white-50' }}">ES</a>
                </div>
                <a href="{{ url_for('cart') }}" class="text-white text-decoration-none position-relative">
                    <i class="bi bi-cart3 fs-4"></i>
                    <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="font-size: 0.6rem;">0</span>
                </a>
            </div>
        </div>
    </header>

    <main class="container py-5">
        {% block content %}{% endblock %}
    </main>
    
    <footer class="py-5 border-top border-secondary mt-5">
        <div class="container text-center text-white-50 small">
            <p>&copy; 2026 FurryCore Network. Todos os direitos reservados.</p>
            <div class="d-flex justify-content-center gap-3">
                <a href="#" class="text-white-50">Termos de Uso</a>
                <a href="#" class="text-white-50">Políticas de Privacidade</a>
                <a href="#" class="text-white-50">Trocas e Devoluções</a>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
