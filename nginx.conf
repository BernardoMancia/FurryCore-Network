events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server_tokens off;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    client_max_body_size 10M;

    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=general_limit:10m rate=10r/s;
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    upstream landing_backend  { server furry_landing:20000;  }
    upstream shop_backend     { server furry_shop:20003;     }
    upstream pawsteps_backend { server furry_pawsteps:20001; }
    upstream cgrf_backend     { server furry_cgrf:20002;     }
    upstream admin_backend    { server furry_admin:29999;    }

    access_log /var/log/nginx/access_log.log;
    error_log  /var/log/nginx/error_log.log;

    proxy_connect_timeout 60s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    map $sent_http_content_type $expires {
        default                    off;
        text/css                   30d;
        application/javascript     30d;
        image/x-icon               365d;
        image/svg+xml              30d;
        ~image/                    30d;
        font/woff2                 365d;
    }

    # ─── ARWOLF.COM.BR (Admin Dashboard) ───────────────────────────────────────
    server {
        listen 80;
        server_name arwolf.com.br www.arwolf.com.br;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name arwolf.com.br www.arwolf.com.br;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(self), camera=(), microphone=()" always;

        location /login {
            limit_req zone=login_limit burst=3 nodelay;
            proxy_pass http://admin_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://admin_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ─── FURRYCORE.COM.BR ───────────────────────────────────────────────────────
    server {
        listen 80;
        server_name furrycore.com.br www.furrycore.com.br;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name furrycore.com.br www.furrycore.com.br;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        expires $expires;

        location /shop/static/ {
            rewrite ^/shop(/.*)$ $1 break;
            proxy_pass http://shop_backend;
            proxy_set_header Host $host;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        location /shop/ {
            rewrite ^/shop(/.*)$ $1 break;
            limit_req zone=general_limit burst=20 nodelay;
            proxy_pass http://shop_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /shop {
            return 301 https://$host/shop/;
        }

        location / {
            limit_req zone=general_limit burst=20 nodelay;
            proxy_pass http://landing_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ─── PAWSTEPS.SOCIAL ───────────────────────────────────────────────────────
    server {
        listen 80;
        server_name pawsteps.social www.pawsteps.social;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name pawsteps.social www.pawsteps.social;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        expires $expires;

        location /login {
            limit_req zone=login_limit burst=3 nodelay;
            proxy_pass http://pawsteps_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            limit_req zone=general_limit burst=20 nodelay;
            proxy_pass http://pawsteps_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ─── CGRF.COM.BR ───────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name cgrf.com.br www.cgrf.com.br;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name cgrf.com.br www.cgrf.com.br;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        expires $expires;

        location /login {
            limit_req zone=login_limit burst=3 nodelay;
            proxy_pass http://cgrf_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            limit_req zone=general_limit burst=10 nodelay;
            proxy_pass http://cgrf_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
