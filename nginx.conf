events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    
    limit_req_zone $binary_remote_addr zone=mylimit:10m rate=10r/s;
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    upstream landing_backend { server landing:20000; }
    upstream shop_backend { server shop:20003; }
    upstream pawsteps_backend { server pawsteps:20001; }
    upstream cgrf_backend { server cgrf:20002; }

    access_log /var/log/nginx/access_log.log;
    error_log /var/log/nginx/error_log.log;

    # Configuração para FURRYCORE.COM.BR
    server {
        listen 80;
        server_name furrycore.com.br www.furrycore.com.br;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name furrycore.com.br www.furrycore.com.br;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        location / {
            limit_req zone=mylimit burst=20 nodelay;
            proxy_pass http://landing_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /shop/ {
            proxy_pass http://shop_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /shop {
            return 301 https://$host/shop/;
        }
    }

    # Configuração para PAWSTEPS.SOCIAL
    server {
        listen 80;
        server_name pawsteps.social www.pawsteps.social;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name pawsteps.social www.pawsteps.social;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        location / {
            limit_req zone=mylimit burst=20 nodelay;
            proxy_pass http://pawsteps_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Configuração para CGRF.COM.BR
    server {
        listen 80;
        server_name cgrf.com.br www.cgrf.com.br;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name cgrf.com.br www.cgrf.com.br;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        location / {
            limit_req zone=mylimit burst=10 nodelay;
            proxy_pass http://cgrf_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}

