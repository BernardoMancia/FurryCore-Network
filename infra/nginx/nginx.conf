# Configuração Nginx - CGRF / PawSteps / Shop
# VPS IP: 82.112.245.99

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Cabeçalhos de Segurança Global (Anti-Vazamento e Invasão)
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self';";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Rate Limiting (Prevenção de DDoS e Força Bruta)
    limit_req_zone $binary_remote_addr zone=mylimit:10m rate=10r/s;

    # 1. CGRF - App Principal (arwolf.com.br)
    server {
        listen 80;
        server_name arwolf.com.br;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name arwolf.com.br;

        ssl_certificate /etc/letsencrypt/live/arwolf.com.br/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/arwolf.com.br/privkey.pem;

        location / {
            limit_req zone=mylimit burst=20 nodelay;
            proxy_pass http://127.0.0.1:6969;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Roteamento da Loja (arwolf.com.br/shop)
        location /shop {
            proxy_pass http://127.0.0.1:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # 2. PawSteps.social - Rede Social
    server {
        listen 80;
        server_name pawsteps.social;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name pawsteps.social;

        ssl_certificate /etc/letsencrypt/live/pawsteps.social/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/pawsteps.social/privkey.pem;

        location / {
            limit_req zone=mylimit burst=15 nodelay;
            proxy_pass http://127.0.0.1:7070;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
