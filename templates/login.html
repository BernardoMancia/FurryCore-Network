{% extends "base.html" %}

{% block title %}Login - CGRF 2.0{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="glass-card">
            <h2 class="neon-text text-center mb-4">Acesso ao Portal</h2>
            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="mb-3">
                    <label class="form-label">E-mail</label>
                    <input type="email" name="email" class="form-control bg-dark text-white border-secondary" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Senha</label>
                    <input type="password" name="password" class="form-control bg-dark text-white border-secondary" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">Token MFA (Apenas Admins)</label>
                    <input type="text" name="token" class="form-control bg-dark text-white border-secondary" placeholder="000000">
                </div>
                <button type="submit" class="btn btn-neon w-100">Entrar</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
