{% extends "base.html" %}

{% block extra_head %}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
<style>
    .preview-container {
        max-width: 100%;
        height: 300px;
        background: #111;
        overflow: hidden;
    }
    #image-to-crop { max-width: 100%; }
</style>
{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-9">
        <div class="glass-card">
            <h2 class="neon-text mb-4 text-center">Emissão de Credencial</h2>
            <form method="POST" id="emitir-form">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <input type="hidden" name="foto_base64" id="foto_base64">
                
                <div class="row">
                    <div class="col-md-7">
                        <div class="mb-3">
                            <label class="form-label small">Nome Social / Identidade</label>
                            <input type="text" name="nome" class="form-control bg-dark text-white border-secondary" placeholder="Ex: Lucke Solo" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small">E-mail (Opcional)</label>
                            <input type="email" name="email" class="form-control bg-dark text-white border-secondary" placeholder="cliente@example.com">
                        </div>
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label small">Espécie</label>
                                    <input type="text" name="especie" class="form-control bg-dark text-white border-secondary" placeholder="Ex: Lobo" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label small">Região</label>
                                    <input type="text" name="regiao" class="form-control bg-dark text-white border-secondary" placeholder="Ex: Sul" required>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-5">
                        <div class="mb-3">
                            <label class="form-label small d-block">Foto de Identidade</label>
                            <div class="preview-container mb-2 border border-secondary rounded d-flex align-items-center justify-content-center">
                                <img id="image-preview" src="" style="display: none; max-width: 100%; max-height: 100%;">
                                <div id="placeholder-icon" class="text-center">
                                    <i class="bi bi-camera fs-1 text-secondary"></i>
                                    <p class="text-secondary x-small">Nenhuma foto</p>
                                </div>
                            </div>
                            <input type="file" id="foto-input" class="form-control form-control-sm" accept="image/*">
                        </div>
                    </div>
                </div>

                <div class="mt-4">
                    <button type="button" id="btn-submit" class="btn btn-neon btn-lg w-100 py-3">Gerar Documento (CNF/RGF)</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Modal para Recorte -->
<div class="modal fade" id="cropperModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
    <div class="modal-dialog modal-lg">
        <div class="modal-content bg-dark text-white">
            <div class="modal-header border-secondary">
                <h5 class="modal-title neon-text">Ajustar Foto</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div style="height: 400px; width: 100%;">
                    <img id="image-to-crop" src="">
                </div>
            </div>
            <div class="modal-footer border-secondary">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" id="btn-crop" class="btn btn-neon">Salvar Ajuste</button>
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block scripts %}
<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
<script>
    let cropper;
    const fotoInput = document.getElementById('foto-input');
    const imageToCrop = document.getElementById('image-to-crop');
    const imagePreview = document.getElementById('image-preview');
    const placeholderIcon = document.getElementById('placeholder-icon');
    let cropperModal;
    const btnCrop = document.getElementById('btn-crop');
    const btnSubmit = document.getElementById('btn-submit');
    const fotoBase64 = document.getElementById('foto_base64');
    const form = document.getElementById('emitir-form');

    document.addEventListener('DOMContentLoaded', function() {
        cropperModal = new bootstrap.Modal(document.getElementById('cropperModal'));
        
        fotoInput.addEventListener('change', function(e) {
            const files = e.target.files;
            if (files && files.length > 0) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    imageToCrop.src = event.target.result;
                    cropperModal.show();
                    fotoInput.value = "";
                };
                reader.readAsDataURL(files[0]);
            }
        });

        // Permitir clicar na prévia para editar novamente
        imagePreview.parentElement.addEventListener('click', function() {
            if (imagePreview.src && imagePreview.src.startsWith('data:')) {
                imageToCrop.src = imagePreview.src;
                cropperModal.show();
            } else {
                fotoInput.click();
            }
        });

        document.getElementById('cropperModal').addEventListener('shown.bs.modal', function() {
            if (cropper) cropper.destroy();
            cropper = new Cropper(imageToCrop, {
                aspectRatio: 1,
                viewMode: 1,
                dragMode: 'move',
                autoCropArea: 1
            });
        });

        btnCrop.addEventListener('click', function() {
            const canvas = cropper.getCroppedCanvas({ width: 400, height: 400 });
            const base64 = canvas.toDataURL('image/png');
            fotoBase64.value = base64;
            imagePreview.src = base64;
            imagePreview.style.display = 'block';
            placeholderIcon.style.display = 'none';
            cropperModal.hide();
        });

        btnSubmit.addEventListener('click', function() {
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }
            if (!fotoBase64.value) {
                alert("Por favor, selecione e ajuste uma foto primeiro.");
                return;
            }
            form.submit();
        });
    });
</script>
{% endblock %}
