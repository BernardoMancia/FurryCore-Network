<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CGRF 2.0{% endblock %}</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0b10;
            --accent-neon: #00f2ff;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --border-glass: rgba(255, 255, 255, 0.05);
        }
        body {
            background-color: var(--bg-color);
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-glass);
            border-radius: 12px;
            padding: 2rem;
        }
        .neon-text {
            color: var(--accent-neon);
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
        }
        .btn-neon {
            background: transparent;
            border: 1px solid var(--accent-neon);
            color: var(--accent-neon);
            transition: 0.3s;
        }
        .btn-neon:hover {
            background: var(--accent-neon);
            color: #000;
            box-shadow: 0 0 20px var(--accent-neon);
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark border-bottom border-glass mb-4">
        <div class="container">
            <a class="navbar-brand neon-text fw-bold" href="{{ url_for('index') }}">CGRF 2.0</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('index') }}">Início</a>
                    </li>
                    {% if current_user.is_authenticated %}
                        {% if current_user.cargo == 'ADMIN' %}
                        <li class="nav-item">
                            <a class="nav-link text-neon" href="{{ url_for('admin_emitir') }}">Emitir</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-warning" href="{{ url_for('admin_usuarios') }}">Gestão</a>
                        </li>
                        {% endif %}
                        <li class="nav-item">
                            <a class="nav-link text-danger" href="{{ url_for('logout') }}">Sair</a>
                        </li>
                    {% else %}
                        <li class="nav-item">
                            <a class="nav-link btn-neon px-3 ms-lg-2" href="{{ url_for('login') }}">Acessar Portal</a>
                        </li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
